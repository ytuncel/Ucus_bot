<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye İHA Takip Sistemi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Stil kodları aynen korunuyor -->
</head>
<body>

    <h2>🛸 Canlı İHA Takip</h2>
    
    <div class="menu-grid">
        <button id="btn-J" onclick="loadFlights('JANDARMA')">🟢 Jandarma</button>
        <button id="btn-O" onclick="loadFlights('DIGER')">🔵 Diğer (TSK & DZKK)</button>
    </div>

    <div id="loading" class="loading" style="display:none;">Veriler merkezi sunucudan birleştiriliyor...</div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Kendi Python API uç noktanız (Artık token ifşa olma derdi bitti)
        const BACKEND_API_URL = "/api/flights"; 

        async function loadFlights(filterType) {
            // Buton aktiflik sınıfları...
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            resultsDiv.innerHTML = '';
            loadingDiv.style.display = 'block';

            try {
                // İstek doğrudan kendi Python backend'imize gidiyor
                const response = await fetch(BACKEND_API_URL);
                const flights = await response.json();
                loadingDiv.style.display = 'none';

                if (!flights || flights.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">Şu an havada aktif İHA bulunamadı.</div>';
                    return;
                }

                // Filtreleme, İlçe analizi ve Kart oluşturma döngüsü Python'dan gelen birleşik veriye göre burada dönecek...
            } catch (error) {
                loadingDiv.style.display = 'none';
                resultsDiv.innerHTML = '<div class="loading" style="color:#ef4444;">Sunucuyla bağlantı kurulamadı!</div>';
            }
        }
    </script>
</body>
</html>
