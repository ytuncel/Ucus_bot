<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye İHA Takip Sistemi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
        h2 { text-align: center; color: #38bdf8; margin-top: 5px; font-size: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { background-color: #1e293b; color: #f8fafc; border: 1px solid #334155; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        button:active { background-color: #334155; transform: scale(0.98); }
        button.active-btn { background-color: #0284c7; border-color: #0ea5e9; }
        .flight-card { background-color: #1e293b; padding: 14px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #64748b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .flight-card.jandarma { border-left-color: #22c55e; }
        .flight-card.diger { border-left-color: #38bdf8; }
        .callsign { font-weight: bold; font-size: 17px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .badge { display: inline-block; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 6px; text-transform: uppercase; }
        .badge.jandarma { background-color: #16a34a; color: white; }
        .badge.diger { background-color: #0284c7; color: white; }
        .details { font-size: 13px; color: #94a3b8; margin-top: 8px; line-height: 1.6; display: grid; grid-template-columns: 1fr; gap: 4px; }
        .details span { display: flex; align-items: center; gap: 6px; }
        .loading { text-align: center; color: #94a3b8; margin: 30px 0; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>

    <h2>🛸 Canlı İHA Takip</h2>
    
    <div class="menu-grid">
        <button id="btn-J" onclick="loadFlights('JANDARMA')">🟢 Jandarma</button>
        <button id="btn-O" onclick="loadFlights('DIGER')">🔵 Diğer (TSK & DZKK)</button>
    </div>

    <div id="loading" class="loading" style="display:none;">Veriler sansürsüz kaynaktan çekiliyor...</div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const AIRLABS_KEY = "c43d4901-5485-4954-a59c-f0b94621e35a"; 
        const BBOX = "25.6,35.8,44.8,42.2";

        // --- TR HAVALİMANLARI KOD/İSİM SÖZLÜĞÜ ---
        const airportDictionary = {
            "ADB": "İzmir Adnan Menderes", "ADB": "Askeri Meydan (İzmir)", // Ekstra eşleşme
            "ESB": "Ankara Esenboğa", "EET": "Askeri Meydan (Ankara)",
            "AYT": "Antalya",
            "BJV": "Bodrum Milas",
            "DLM": "Dalaman",
            "ADA": "Adana Şakirpaşa", "ADA": "İncirlik Askeri Üssü",
            "ERZ": "Erzurum", "ERZ": "Erzurum Askeri Meydanı",
            "MLX": "Malatya Erhaç", "MLX": "Askeri Meydan (Malatya)",
            "DIY": "Diyarbakır", "DIY": "Askeri Meydan (Diyarbakır)",
            "BAL": "Batman Askeri Üssü", "BAL": "Batman", // Batman Kodu
            "VAS": "Van Ferit Melen", "VAS": "Askeri Meydan (Van)",
            "KYA": "Konya Askeri Üssü", "KYA": "Konya",
            "GZT": "Gaziantep",
            "HTY": "Hatay",
            "EDO": "Balıkesir Koca Seyit (Edremit)", "BZI": "Balıkesir Askeri Meydanı",
            "CKZ": "Çanakkale",
            "CKB": "Kuşadası (Bilinmiyor)", // Kuşadası Kodu
            "ERC": "Erzincan",
            "TJR": "Şırnak Şerafettin Elçi (Cizre)",
            "TEQ": "Tekirdağ Çorlu",
            "EZS": "Elazığ",
            "GNY": "Geçitkale Askeri Üssü (KKTC)", "ECN": "Ercan (KKTC)",
            "LT": "Askeri Meydan (Genel TR Kod)", // AirLabs'in askeri LTxx kodları için
        };

        const locations = [
            // Dalaman-Fethiye-Kuşadası (image_5.png bölgesi)
            {name: "Dalaman / Muğla", lat: 36.7, lng: 28.8},
            {name: "Fethiye / Muğla", lat: 36.6, lng: 29.1},
            {name: "Kuşadası / Aydın", lat: 37.8, lng: 27.3},
            // Diğer Kritik İHA Merkezleri
            {name: "Burhaniye / Balıkesir", lat: 39.5, lng: 26.9},
            {name: "Edremit / Balıkesir", lat: 39.5, lng: 27.0},
            {name: "Çanakkale Merkez", lat: 40.1, lng: 26.4},
            {name: "Geçitkale / KKTC", lat: 35.2, lng: 33.7},
            {name: "Batman Merkez", lat: 37.9, lng: 41.1},
            {name: "İncirlik / Adana", lat: 37.0, lng: 35.4},
            {name: "Diyarbakır Merkez", lat: 37.9, lng: 40.2},
            {name: "Van Ferit Melen", lat: 38.4, lng: 43.3},
            {name: "Şırnak / Cizre", lat: 37.3, lng: 42.1},
            {name: "Erzurum Merkez", lat: 39.9, lng: 41.2},
            {name: "Konya Merkez", lat: 37.9, lng: 32.5},
            {name: "Ankara / Etimesgut", lat: 39.9, lng: 32.7},
            {name: "İzmir / Gaziemir", lat: 38.3, lng: 27.1}
        ];

        function getApproximateLocation(lat, lng) {
            if (!lat || !lng) return "Bilinmiyor";
            let closest = "Türkiye Hava Sahası";
            let minDistance = Infinity;
            
            // 30+ merkez kontrolü
            locations.forEach(loc => {
                let d = Math.sqrt(Math.pow(loc.lat - lat, 2) + Math.pow(loc.lng - lng, 2));
                if (d < minDistance) {
                    minDistance = d;
                    closest = loc.name;
                }
            });

            // Eğer listelediğimiz merkezlere yakınsa o ismi yaz
            if (minDistance < 1.2) {
                return closest;
            } else {
                // Değilse, koordinat aralığına göre kabaca şehir ismi tahmin et (Türkiye Hava Sahası yazısını kaldırdık)
                if (lat > 39.5 && lng < 28.5) return "Marmara Bölgesi / İlçe Bilinmiyor";
                if (lat > 37.5 && lat < 39.5 && lng < 28.5) return "İzmir-Aydın-Manisa";
                if (lat < 37.5 && lng < 29.5) return "Muğla-Antalya Sınırı";
                if (lat < 37.5 && lng > 35.5) return "Güneydoğu Sınır Hattı";
                if (lat > 39.5 && lng > 35.5) return "Karadeniz-Doğu Anadolu";
                if (lng > 31.5 && lng < 35.5) return "İç Anadolu";
                return "Türkiye Hava Sahası / İlçe Bilinmiyor";
            }
        }

        function getAirportName(iataCode) {
            if (!iataCode) return "Askeri / Belirtilmemiş";
            // Eğer kod 4 harfli LTxx formatındaysa sivil kod sözlüğüne bakma, doğrudan askeri yaz
            if (iataCode.length === 4 && iataCode.startsWith("LT")) return airportDictionary["LT"];
            // Sözlükten eşleştir, yoksa kodu aynen bırak (Örn: Rodos-LGRP ise LGRP yazar)
            return airportDictionary[iataCode] || iataCode;
        }

        async function loadFlights(filterType) {
            document.getElementById('btn-J').classList.remove('active-btn');
            document.getElementById('btn-O').classList.remove('active-btn');
            if(filterType === 'JANDARMA') document.getElementById('btn-J').classList.add('active-btn');
            if(filterType === 'DIGER') document.getElementById('btn-O').classList.add('active-btn');

            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            resultsDiv.innerHTML = '';
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch(`https://airlabs.co/api/v9/flights?api_key=${AIRLABS_KEY}&_bbox=${BBOX}`);
                const data = await response.json();
                loadingDiv.style.display = 'none';

                if (!data.response || data.response.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">Şu an havada aktif İHA bulunamadı.</div>';
                    return;
                }

                let count = 0;
                data.response.forEach(f => {
                    const cs = (f.flight_icao || f.flight_iata || "").toUpperCase();
                    const hex = (f.hex || "").toLowerCase();
                    const acIcao = (f.aircraft_icao || "").toUpperCase();
                    const altMeters = f.alt || 0;
                    const speedKmh = f.speed || 0;
                    
                    // --- SİVİL ENGELLEME VE TR DIŞI FİLTRESİ ---
                    const sivilHavaYollari = ["JAL", "JAI", "JST", "JAV", "JBU", "JET", "JZR", "JAF", "JTA", "SXS", "THY", "PGT", "AJet", "VOI", "EZY"];
                    let isSivilHavaYolu = sivilHavaYollari.some(prefix => cs.startsWith(prefix.toUpperCase()));

                    // Kalkış/İniş TR dışı ise veya TR dışı sivil kod gelse listeden sil (Aksine bir telsiz kodu eşleşmesi yoksa)
                    let dep = f.dep_iata || "";
                    let arr = f.arr_iata || "";
                    let isTrOrigin = (dep.startsWith("LT") || dep in airportDictionary || dep === "");
                    let isTrDest = (arr.startsWith("LT") || arr in airportDictionary || arr === "");
                    let isForeignRoute = (!isTrOrigin || !isTrDest) && dep.length > 0 && arr.length > 0; // Her iki meydan da TR dışıysa

                    if (isForeignRoute) return; // Yabancı TR dışı uçuşları sil

                    let isJandarma = false;
                    let isDigerIha = false;

                    let isPureAskeriS = /^S\d+$/.test(cs); // Örn: S26 (image_5.png)

                    // Jandarma Filtresi (Sivil şirket formatı değilse J ile başlayanları ve hızı/irtifası İHA karakteristiğindeyse dahil et)
                    if (hex === "4b8394" || cs.startsWith("JBK") || (cs.startsWith("J") && !isSivilHavaYolu && cs.length >= 3 && altMeters < 8000 && speedKmh < 300)) {
                        isJandarma = true;
                    } 
                    // TSK & DZKK İHA Filtresi (TCB, TCS ve BT2 modeli genişletildi)
                    else if (
                        hex === "4b8362" || hex === "4b8361" || // TCS38'in hex kodu (image_5.png'den aldım)
                        cs.startsWith("BATU") || 
                        cs.startsWith("TCS") || // Hava Kuvvetleri Çağrı Kodu Örn: TCS38
                        cs.startsWith("TCB") || // Deniz Kuvvetleri İHA'ları (Örn: TCB817)
                        cs.startsWith("TB2") || 
                        cs.startsWith("BAYRAKTAR") || 
                        cs.startsWith("ANKA") || 
                        cs.startsWith("AKINCI") ||
                        isPureAskeriS || // Hava Kuvvetleri İHA'ları (Örn: S26)
                        acIcao === "TB2" || acIcao === "BT2" ||
                        // Kırık/Maskelenmiş transponder yakalama
                        ((hex === "000000" || hex === "") && altMeters > 1000 && altMeters < 7000 && speedKmh > 50 && speedKmh < 200) ||
                        // Sivil şirket formatı değilse ve hızı/irtifası tam TB2 profilindeyse
                        (!isSivilHavaYolu && cs.length >= 2 && altMeters > 500 && altMeters < 7500 && speedKmh > 40 && speedKmh < 240)
                    ) {
                        isDigerIha = true;
                    }

                    if (filterType === 'JANDARMA' && !isJandarma) return;
                    if (filterType === 'DIGER' && !isDigerIha) return;

                    count++;

                    // Birim Dönüşümleri
                    const altFt = f.alt ? (f.alt * 3.28084).toLocaleString(undefined, {maximumFractionDigits: 0}) + " ft" : "Veri Yok";
                    const speedKts = f.speed ? (f.speed / 1.852).toFixed(0) + " kts" : "Veri Yok";
                    const approxLoc = getApproximateLocation(f.lat, f.lng);

                    // Havalimanı İsim Dönüşümleri
                    const depName = getAirportName(dep);
                    const arrName = getAirportName(arr);

                    // Model Tahmin geliştirme
                    let estimatedModel = "İHA / SİHA";
                    if (cs.startsWith("TB2") || cs.startsWith("TCS") || cs.startsWith("TCB") || isPureAskeriS || acIcao === "TB2" || acIcao === "BT2" || hex === "4b8394" || hex === "4b8362" || hex === "4b8361") {
                        estimatedModel = "Bayraktar TB2";
                    } else if (cs.startsWith("ANKA")) {
                        estimatedModel = "TAI Anka";
                    } else if (cs.startsWith("AKINCI")) {
                        estimatedModel = "Bayraktar Akıncı";
                    }

                    // Dinamik Etiket Belirleme
                    let badgeText = "Genel İHA / SİHA";
                    if (isJandarma) badgeText = "Jandarma G.K.";
                    else if (hex === "4b8362" || cs.startsWith("BATU") || cs.startsWith("TCB")) badgeText = "Deniz Kuvvetleri";
                    else if (cs.startsWith("TCS") || isPureAskeriS || hex === "4b8361") badgeText = "Hava Kuvvetleri";

                    const cssClass = isJandarma ? "jandarma" : "diger";
                    const badgeClass = isJandarma ? "jandarma" : "diger";

                    const card = `
                        <div class="flight-card ${cssClass}">
                            <div class="callsign">
                                📡 Telsiz: ${cs || "BELİRTİLMEMİŞ"}
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </div>
                            <div class="details">
                                <span>🆔 <b>Kuyruk No (Hex):</b> ${hex ? hex.toUpperCase() : "MASKELENMİŞ (0000)"}</span>
                                <span>✈️ <b>Model:</b> ${estimatedModel}</span>
                                <span>📐 <b>İrtifa:</b> ${altFt}</span>
                                <span>💨 <b>Hız:</b> ${speedKts}</span>
                                <span>📍 <b>Yaklaşık İlçe/Şehir:</b> ${approxLoc}</span>
                                <span>🛫 <b>Kalkış Meydanı:</b> ${depName}</span>
                                <span>🛬 <b>İniş Meydanı:</b> ${arrName}</span>
                            </div>
                        </div>
                    `;
                    resultsDiv.innerHTML += card;
                });

                if (count === 0) {
                    resultsDiv.innerHTML = '<div class="loading">Şu an havada aktif bir İHA takibi kaydedilmedi.</div>';
                }

            } catch (error) {
                loadingDiv.style.display = 'none';
                resultsDiv.innerHTML = '<div class="loading" style="color:#ef4444;">Veriler çekilirken bir hata oluştu!</div>';
            }
        }
    </script>
</body>
</html>
