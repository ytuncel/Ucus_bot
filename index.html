<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye Hava Takip Sistemi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #17212b; color: #f5f5f5; margin: 0; padding: 15px; }
        h2 { text-align: center; color: #5288c1; margin-top: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { background-color: #2b5278; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        button:active { background-color: #366796; }
        button.wide { grid-column: span 2; background-color: #613838; }
        .flight-card { background-color: #24303f; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #5288c1; }
        .flight-card.dzkk { border-left-color: #3a86ff; }
        .flight-card.jandarma { border-left-color: #38b000; }
        .flight-card.sgk { border-left-color: #ffb703; }
        .callsign { font-weight: bold; font-size: 16px; color: #fff; }
        .details { font-size: 13px; color: #b1c3d4; margin-top: 5px; line-height: 1.4; }
        .badge { display: inline-block; padding: 2px 6px; font-size: 11px; font-weight: bold; border-radius: 4px; float: right; }
        .badge.dzkk { background-color: #3a86ff; color: white; }
        .badge.jandarma { background-color: #38b000; color: white; }
        .badge.sgk { background-color: #ffb703; color: black; }
        .loading { text-align: center; color: #aaa; margin: 20px 0; font-style: italic; }
    </style>
</head>
<body>

    <h2>🛰️ Canlı Hava Takip</h2>
    
    <div class="menu-grid">
        <button onclick="loadFlights('J')">🟢 Jandarma</button>
        <button onclick="loadFlights('BATU')">⚓ DZKK</button>
        <button onclick="loadFlights('SGK')">🟡 Sahil Güvenlik</button>
        <button onclick="loadFlights('ORMAN')">🟠 Orman</button>
        <button class="wide" onclick="loadFlights('ALL')">🔴 Tüm Askeri/İHA Trafiği</button>
    </div>

    <div id="loading" class="loading" style="display:none;">Uçuş verileri canlı çekiliyor...</div>
    <div id="results"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ekranı tam boy yap

        // BURAYA KENDİ AIRLABS API KEYİNİ YAZACAKSIN
        const AIRLABS_KEY = "c43d4901-5485-4954-a59c-f0b94621e35a"; 
        const BBOX = "25.6,35.8,44.8,42.2";

        async function loadFlights(filterType) {
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            resultsDiv.innerHTML = '';
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch(`https://airlabs.co/api/v9/flights?api_key=${AIRLABS_KEY}&_bbox=${BBOX}`);
                const data = await response.json();
                loadingDiv.style.display = 'none';

                if (!data.response || data.response.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">Şu an aktif uçuş bulunamadı.</div>';
                    return;
                }

                let count = 0;
                data.response.forEach(f => {
                    const cs = (f.flight_icao || f.flight_iata || "BİLİNMİYOR").toUpperCase();
                    const hex = (f.hex || "").toLowerCase();
                    
                    let label = "İHA / Genel";
                    let cssClass = "";
                    let badgeClass = "";
                    let isMatch = false;

                    // Filtreleme Mantığı
                    if (hex === "4b8362" || cs.startsWith("BATU")) {
                        label = "⚓ Deniz Kuvvetleri"; cssClass = "dzkk"; badgeClass = "dzkk"; if(filterType === 'BATU' || filterType === 'ALL') isMatch = true;
                    } else if (hex === "4b8392" || hex === "4b8394" || cs.startsWith("J")) {
                        label = "🟢 Jandarma G.K."; cssClass = "jandarma"; badgeClass = "jandarma"; if(filterType === 'J' || filterType === 'ALL') isMatch = true;
                    } else if (hex === "4b83a4" || cs.startsWith("SGK")) {
                        label = "🟡 Sahil Güvenlik"; cssClass = "sgk"; badgeClass = "sgk"; if(filterType === 'SGK' || filterType === 'ALL') isMatch = true;
                    } else if (cs.startsWith("ORMAN")) {
                        label = "🟠 Orman Gen. Md."; cssClass = "orman"; badgeClass = "orman"; if(filterType === 'ORMAN' || filterType === 'ALL') isMatch = true;
                    } else {
                        // Diğer askeri İHA ön ekleri
                        const milPrefixes = ["ANKA", "AKINCI", "AKSUNGUR", "TB2", "BAYRAKTAR", "THK", "TUAF", "T"];
                        if (milPrefixes.some(p => cs.startsWith(p)) || f.alt < 7315) {
                            if(filterType === 'ALL' && !cs.startsWith("THK")) isMatch = true;
                        }
                    }

                    if (isMatch) {
                        count++;
                        const altFt = f.alt ? (f.alt * 3.28084).toLocaleString(undefined, {maximumFractionDigits: 0}) + " ft" : "N/A";
                        const speedKts = f.speed ? (f.speed / 1.852).toFixed(1) + " kts" : "N/A";
                        
                        const card = `
                            <div class="flight-card ${cssClass}">
                                <span class="badge ${badgeClass}">${label}</span>
                                <div class="callsign">${cs} <span style="font-size:11px; color:#888;">(${hex})</span></div>
                                <div class="details">
                                    📐 <b>İrtifa:</b> ${altFt}<br>
                                    💨 <b>Hız:</b> ${speedKts}<br>
                                    📍 <b>Koordinat:</b> ${f.lat ? f.lat.toFixed(3) : 'N/A'}, ${f.lng ? f.lng.toFixed(3) : 'N/A'}<br>
                                    🛫 <b>Rota:</b> ${f.dep_iata || 'N/A'} → ${f.arr_iata || 'N/A'}
                                </div>
                            </div>
                        `;
                        resultsDiv.innerHTML += card;
                    }
                });

                if (count === 0) {
                    resultsDiv.innerHTML = '<div class="loading">Bu kategoride şu an aktif uçuş bulunamadı.</div>';
                }

            } catch (error) {
                loadingDiv.style.display = 'none';
                resultsDiv.innerHTML = '<div class="loading" style="color:#e63946;">Veri çekilirken hata oluştu!</div>';
            }
        }
    </script>
</body>
</html>
